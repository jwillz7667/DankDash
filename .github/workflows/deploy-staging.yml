name: deploy-staging

# Staging deploys are gated on a green CI run, not on the raw push. The `ci`
# workflow (typecheck/lint/test + compliance & payments coverage gates) must
# complete on main before this fires; a failed CI run is filtered out by the
# job-level `if` below. `workflow_dispatch` remains an operator override.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    name: railway staging
    runs-on: ubuntu-latest
    # Only deploy when the upstream CI run actually passed. Manual dispatch has
    # no upstream run, so allow it through unconditionally (operator override).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://api.staging.dankdash.com
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On workflow_run, github.sha is the default-branch head, which may
          # have advanced past the commit CI validated. Pin to the exact commit
          # the triggering CI run tested; fall back to github.sha on dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "${HOME}/.railway/bin" >> "${GITHUB_PATH}"

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service api --detach
        working-directory: apps/api

      - name: Deploy realtime
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service realtime --detach
        working-directory: apps/realtime

      - name: Deploy workers
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service workers --detach
        working-directory: apps/workers

      - name: Smoke-test API
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS https://api.staging.dankdash.com/health >/dev/null; then
              echo "API healthy"; exit 0
            fi
            sleep 10
          done
          echo "API did not become healthy within 5 minutes" >&2
          exit 1

  # Portal lives on Vercel; their GitHub integration handles auto-deploys per
  # commit. This job is a no-op verifier that prints which commit Vercel
  # should pick up, so the staging deploy timeline matches the API timeline.
  vercel-marker:
    name: vercel portal marker
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Notify
        run: |
          echo "Vercel will deploy commit ${{ github.event.workflow_run.head_sha || github.sha }} for apps/portal automatically."
