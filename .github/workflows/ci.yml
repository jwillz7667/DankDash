name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  TURBO_TELEMETRY_DISABLED: "1"
  HUSKY: "0"
  # TURBO_TOKEN (a secret) is scoped to the individual jobs that invoke turbo
  # — see the `verify` and `compliance-gate` job `env:` blocks. Keeping it out
  # of this workflow-level block means it is not exposed to every job/step
  # (SAST rule gha-workflow-env-secret). TURBO_TEAM travels alongside it.

jobs:
  verify:
    name: typecheck / lint / test
    runs-on: ubuntu-latest
    # The @dankdash/api integration suite is the long pole: it boots a
    # Postgres testcontainer and the full Nest AppModule once per file. It
    # now runs exactly ONCE (coverage-instrumented — see the dedicated step
    # below), not twice. 40m is deliberate temporary headroom while the
    # suite's per-test reseed cost is profiled from the streamed verbose
    # output; tighten once the steady-state runtime is known.
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        node-version: ["20"]

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dankdash
          POSTGRES_PASSWORD: dankdash
          POSTGRES_DB: dankdash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dankdash -d dankdash_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dankdash:dankdash@localhost:5432/dankdash_test
      DATABASE_URL_TEST: postgresql://dankdash:dankdash@localhost:5432/dankdash_test
      REDIS_URL: redis://localhost:6379
      # Turbo remote cache — scoped here (job-level) rather than workflow-level
      # so the secret is not exposed to jobs that never call turbo.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap extensions in postgres service
        env:
          PGPASSWORD: dankdash
        run: |
          for ext in postgis pg_trgm pgcrypto citext "uuid-ossp" btree_gin; do
            psql -h localhost -U dankdash -d dankdash_test -c "CREATE EXTENSION IF NOT EXISTS \"${ext}\";"
          done

      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-main-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (non-API packages)
        # Green/red across every package EXCEPT @dankdash/api, which is the
        # long-pole integration suite run once on its own below. No
        # `--coverage` here: several packages lack @vitest/coverage-v8 and
        # would error; per-gate coverage is enforced in the api step. Nothing
        # in the workspace depends on @dankdash/api, so excluding it is safe.
        # `--log-order=stream` interleaves task output live — turbo's default
        # grouped buffering only flushes a task's output on completion, so a
        # never-completing task would otherwise swallow the entire log.
        run: pnpm turbo run test --filter='!@dankdash/api' --log-order=stream
        env:
          NODE_ENV: test

      - name: Test + coverage gate (API, streamed)
        # The API suite runs exactly ONCE here. This single coverage-
        # instrumented run is BOTH the green/red signal for @dankdash/api and
        # the enforcement of the payments module's mandated 100%
        # lines/statements/functions threshold (apps/api/vitest.config.ts).
        # Routed through turbo so the `test -> ^build` chain produces dist/ for
        # api's workspace deps first (the step is self-sufficient). `--force`
        # is REQUIRED: turbo does not hash pass-through args, so a cached
        # non-coverage result would otherwise be replayed and `--coverage`
        # silently skipped. `--log-order=stream` + vitest `--reporter=verbose`
        # stream a line per test live, so if the suite stalls the last line
        # printed pinpoints the offending test.
        run: pnpm turbo run test --filter='@dankdash/api' --force --log-order=stream -- --coverage --reporter=verbose
        env:
          NODE_ENV: test

      - name: Build (API)
        run: pnpm --filter @dankdash/api build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unit
          slug: jwillz7667/DankDash

  security-audit:
    name: dependency audit (high + critical)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # Policy lives in audit-ci.json at the repo root. The gate fails the
        # job on any high or critical advisory; moderate and low are reported
        # but do not block. Allowlist entries belong in audit-ci.json with an
        # `expiry` date so we cannot silently accumulate untriaged debt.
        run: pnpm run security:audit

  secrets-scan:
    name: secrets scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need the base branch tip so we can scope the scan to the PR
          # diff. `fetch-depth: 0` would also work but is heavier than
          # the targeted fetch below.
          fetch-depth: 0

      - name: Install gitleaks
        # Pin a release so a malicious upstream tag cannot bypass the
        # scan. Upgrade intentionally in a separate commit when bumping.
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan PR / push for secrets
        # On a PR, scope to the commit range between base and head.
        # On a push to main, scope to the single pushed commit.
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            LOG_OPTS="origin/${GITHUB_BASE_REF}..HEAD"
          else
            LOG_OPTS="${GITHUB_SHA}~1..${GITHUB_SHA}"
          fi
          gitleaks detect \
            --config=.gitleaks.toml \
            --log-opts="${LOG_OPTS}" \
            --redact \
            --no-banner \
            --verbose \
            --exit-code=1

  snyk:
    name: snyk vulnerability scan (high+critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Snyk requires SNYK_TOKEN. Skip when running against a fork PR
    # (forks cannot read repo secrets) so contributors are not blocked
    # waiting on a job that cannot succeed for them.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Snyk token
        # Snyk is supplementary defence-in-depth: the `dependency audit`
        # job already gates the same high+critical advisories via the npm
        # registry. When SNYK_TOKEN is not provisioned, skip the scan with
        # a warning instead of hard-failing CI on a missing credential.
        id: snyk_token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -n "${SNYK_TOKEN}" ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::SNYK_TOKEN is not configured — skipping Snyk scan. High+critical advisories are still gated by the dependency-audit (pnpm) and semgrep jobs."
          fi

      - name: Snyk test
        # `--all-projects` walks every workspace lockfile. We pin the
        # severity threshold to high so the gate stays in sync with the
        # `pnpm audit` policy — moderate/low advisories are reported in
        # the Snyk UI but do not block the merge. `DankDashKit` (Swift)
        # is excluded: the snyk container has no `swift` toolchain, so its
        # Package.swift cannot be resolved and would abort the scan.
        if: ${{ steps.snyk_token.outputs.present == 'true' }}
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master (no tagged releases)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects --exclude=DankDashKit --policy-path=.snyk

  license-audit:
    name: license audit (forbid GPL/AGPL/LGPL family)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production licenses
        # Script lives at scripts/audit-licenses.sh and is the source of
        # truth for forbidden license SPDX identifiers. Updating the
        # forbidden list is a deliberate code change with legal review.
        run: pnpm run security:licenses

  semgrep:
    name: semgrep SAST (owasp + typescript + nodejs + repo-local)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip Dependabot's auto-PRs — semgrep registry pulls take ~30s of network
    # the bot doesn't need (its diff is package metadata, not source code).
    if: github.actor != 'dependabot[bot]'

    container:
      # Pin a specific tag so a malicious registry tag can't slip a different
      # binary in. Bump intentionally in a dedicated commit.
      image: returntocorp/semgrep:1.92.0

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run semgrep
        # Hosted rulesets cover the OWASP Top 10 + TypeScript/Node patterns;
        # repo-local rules in `.semgrep/` enforce the project-specific bans
        # (`console.log`, silent `catch`, `as any`, `// TODO`). The `--error`
        # flag converts findings into a non-zero exit, blocking the merge.
        run: |
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/nodejs \
            --config=.semgrep \
            --error \
            --metrics=off \
            --exclude='**/node_modules/**' \
            --exclude='**/dist/**' \
            --exclude='**/build/**' \
            --exclude='**/.next/**'

  codeql:
    name: codeql analysis (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` is broader than `security-extended` — we want
          # the quality checks too because they catch latent issues (unused
          # exceptions, dead error paths) that complement semgrep.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:${{ matrix.language }}"

  compliance-gate:
    name: compliance suite (blocks deploy)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    env:
      # Turbo remote cache — job-scoped (not workflow-level) so the secret is
      # only present in jobs that invoke turbo (SAST rule gha-workflow-env-secret).
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.3
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run compliance tests with coverage
        # The @dankdash/compliance package is the existential gate — its tests
        # must pass AND hit 100% (lines/statements/functions/branches, enforced
        # by packages/compliance/vitest.config.ts) before any merge to main or
        # any deploy.
        #
        # Route through turbo (not pnpm --filter) so the `^build` dependency
        # chain produces dist/ for @dankdash/dispensaries and @dankdash/types
        # before vitest tries to resolve them.
        #
        # `--force` is REQUIRED: turbo's `test` task hashes src/test/config but
        # NOT pass-through args, so a cached non-coverage result would otherwise
        # be replayed and the `--coverage` thresholds silently skipped.
        run: pnpm turbo run test --filter @dankdash/compliance --force -- --coverage
