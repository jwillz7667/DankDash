# ============================================================================
# DankDash — Railway service config for @dankdash/realtime
#
# Per-service config for the standalone Socket.io service (namespaces,
# Redis adapter, JWT handshake auth, stream consumer). Wired onto the
# service via the `Config-as-code path` field (railwayConfigFile =
# infra/railway.realtime.toml).
# ============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.realtime"
watchPatterns = [
  "apps/realtime/**",
  "packages/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json",
  "tsconfig.base.json",
  "infra/Dockerfile.realtime",
  "infra/railway.realtime.toml",
]

[deploy]
# Socket.io connections are sticky — Railway's TCP proxy handles
# session affinity, so multi-replica is safe now that the Redis pub/sub
# adapter is wired (apps/realtime/src/io/redis-adapter.ts). Kept at one
# replica until there is load to justify scaling out (and note: >1
# replica requires the Railway Pro plan — Hobby caps at a single
# instance). The /health probe is dependency-free; /health/ready pings
# Redis but is intentionally NOT the deploy gate.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

[deploy.envs]
NODE_ENV = "production"
ALLOW_PARTIAL_ENV = "0"
